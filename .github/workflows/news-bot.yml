name: Dubai news bot

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: dubai-news-bot-breaking
  cancel-in-progress: false

jobs:
  send-news:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/cache@v4
        with:
          path: seen.sqlite3
          key: seen-${{ github.run_id }}
          restore-keys: |
            seen-

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - run: pip install -r requirements.txt

      - run: python bot.py --process-updates
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          AI_REWRITE: "0"

      - run: python bot.py
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          AI_REWRITE: "0"
          MAX_ITEMS: "8"
          MIN_SCORE: "7"
          BREAKING_SCORE: "14"
          BOT_MODE: "breaking"
          LOOKBACK_HOURS: "24"
